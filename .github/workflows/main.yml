name: Build APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
      
      - name: Buat projek Flutter dan salin file
        run: |
          flutter create --org com.obsidian --project-name obsidian_engine .
          mkdir -p lib
          cp -f lib/main.dart lib/main.dart.bak 2>/dev/null || true
          rm -rf lib/*
          cp -r ../OBSIDIAN-ENGINE-/lib/* lib/ 2>/dev/null || true
          cp -r ../OBSIDIAN-ENGINE-/assets assets/ 2>/dev/null || true
      
      - run: flutter pub get
      - run: flutter build apk --release
      
      - uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
